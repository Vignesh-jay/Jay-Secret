<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JΛY Secret</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/variables.css" />

    <link rel="stylesheet" href="assets/css/animations.css" />

    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#edf7e9" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/icons/icon-16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/icons/icon-32.png"
    />

    <!-- Apple -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/icons/icon-180.png"
    />

    <!-- Android / PWA -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#EDF7E9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JΛY Secret" />
  </head>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>

  <body>
    <div class="background"></div>
    <div id="leaf-container"></div>

    <main>
      <section class="glass-card">
        <div class="glass-light"></div>
        <div class="glass-reflection"></div>
        <div class="glass-edge"></div>
        <div class="glass-noise"></div>

        <div class="card-content">
          <div class="logo">
            <img src="assets/images/logo.svg" alt="JΛY Secret" />
          </div>

          <h1>JΛY Secret</h1>

          <p>Share secrets securely with one-time links.</p>

          <form id="secretForm">
            <div class="form-group">
              <label>Title</label>

              <input type="text" id="title" placeholder="Office VPN" />
            </div>

            <div class="form-group">
              <label>Secret</label>

              <textarea
                id="secret"
                rows="5"
                placeholder="Enter your password or secret..."
              ></textarea>
            </div>

            <div class="form-group">
              <label>Expires In</label>

              <select id="expiry">
                <option value="10m">10 Minutes</option>

                <option value="15m">15 Minutes</option>

                <option value="30m">30 Minutes</option>

                <option value="60m" selected>1 Hour</option>

                <option value="90m">90 Minutes</option>

                <option value="24h">24 Hours</option>

                <option value="48h">48 Hours</option>
              </select>
            </div>
            <button type="submit">🔒 Generate Secure Link</button>
          </form>
        </div>
      </section>
      <footer>Built with ❤️ by Vignesh Jayaraman</footer>
    </main>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/leaves.js"></script>
    <script src="assets/js/parallax.js"></script>
    <script src="/assets/js/pwa.js"></script>
  </body>
</html>
